groups:
  - name: homelab
    rules:

      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "VM fora do ar"
          description: "{{ $labels.instance }} esta down ha mais de 1 minuto."

      - alert: HighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "CPU alta"
          description: "CPU de {{ $labels.instance }} esta acima de 80% ha 2 minutos."

      - alert: HighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Memoria alta"
          description: "Memoria de {{ $labels.instance }} esta acima de 85% ha 2 minutos."
